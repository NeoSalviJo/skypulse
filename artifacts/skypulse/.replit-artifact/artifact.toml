kind = "web"
previewPath = "/"
title = "SkyPulse"
version = "1.0.0"
id = "artifacts/skypulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25374

[services.development]
run = "pnpm --filter @workspace/skypulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skypulse", "run", "build" ]
publicDir = "artifacts/skypulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25374"
BASE_PATH = "/"
